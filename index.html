<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espanhol Teste Grátis - Gabarito Max</title>
  <style>
    :root{
      --bg:#05070c;
      --card:#11141b;
      --card2:#171b24;
      --blue:#00f3ff;
      --pink:#ff00e6;
      --green:#39ff14;
      --red:#ff003c;
      --yellow:#ffd400;
      --text:#ffffff;
      --muted:#cfcfcf;
      --line:rgba(255,255,255,.08);
      --lock:#6b7280;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:var(--text);
      min-height:100vh;
      padding:20px 12px 40px;
      text-align:center;
      overflow-x:hidden;
    }

    header{
      max-width:1100px;
      margin:0 auto 24px;
      border:2px solid var(--blue);
      border-radius:24px;
      padding:22px 16px;
      background:linear-gradient(180deg,#0c0f16,#090b11);
      box-shadow:0 0 22px rgba(0,243,255,.22);
    }

    header h1{
      color:var(--blue);
      font-size:clamp(2rem,4vw,3rem);
      text-shadow:0 0 14px rgba(0,243,255,.7);
      font-weight:900;
    }

    header p{
      margin-top:10px;
      color:var(--pink);
      font-weight:800;
      font-size:clamp(1rem,2vw,1.3rem);
    }

    #app{
      width:100%;
      max-width:1100px;
      margin:0 auto;
    }

    .box{
      width:100%;
      max-width:100%;
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px 16px;
      box-shadow:0 0 20px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .btn{
      display:block;
      width:100%;
      max-width:560px;
      margin:10px auto;
      padding:14px 16px;
      border:2px solid var(--blue);
      background:transparent;
      color:#fff;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      font-size:1rem;
      line-height:1.45;
      transition:.2s;
      white-space:normal;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .btn:hover:not(:disabled){
      background:var(--blue);
      color:#000;
      box-shadow:0 0 18px rgba(0,243,255,.35);
    }

    .btn-lock{
      border-color:var(--lock);
      color:#d1d5db;
      background:rgba(255,255,255,.03);
    }

    .btn-lock:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
      box-shadow:none;
    }

    .btn-premium{
      border-color:var(--yellow);
      color:var(--yellow);
    }

    .btn-premium:hover:not(:disabled){
      background:var(--yellow);
      color:#000;
      box-shadow:0 0 18px rgba(255,212,0,.35);
    }

    .btn-voltar{
      border-color:#666;
      color:#ddd;
    }

    .btn-voltar:hover:not(:disabled){
      background:#333;
      color:#fff;
      box-shadow:none;
    }

    .btn.correct{
      background:var(--green)!important;
      border-color:var(--green)!important;
      color:#000!important;
    }

    .btn.wrong{
      background:var(--red)!important;
      border-color:var(--red)!important;
      color:#fff!important;
    }

    .grid-areas{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:18px;
    }

    .card-area{
      background:linear-gradient(135deg, rgba(0,243,255,.08), rgba(255,0,230,.08));
      border:1px solid rgba(0,243,255,.16);
      border-radius:16px;
      padding:16px;
      text-align:left;
      min-width:0;
    }

    .card-area.locked{
      background:linear-gradient(135deg, rgba(107,114,128,.10), rgba(55,65,81,.12));
      border-color:rgba(107,114,128,.25);
    }

    .card-area h3{
      color:var(--blue);
      margin-bottom:8px;
      font-size:1.12rem;
      line-height:1.35;
      word-break:break-word;
    }

    .card-area.locked h3{
      color:#d1d5db;
    }

    .card-area p{
      color:#ddd;
      font-size:.95rem;
      line-height:1.45;
      margin-bottom:10px;
      word-break:break-word;
    }

    .status{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
      color:var(--pink);
      font-weight:bold;
      text-align:left;
    }

    #question-text{
      font-size:1.05rem;
      line-height:1.6;
      margin:20px 0;
      min-height:88px;
      text-align:left;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .question-label{
      display:block;
      color:var(--yellow);
      font-weight:bold;
      margin-bottom:8px;
    }

    .text-base{
      display:block;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:14px;
      margin:10px 0 14px;
      color:#f5f5f5;
      font-style:italic;
      line-height:1.65;
    }

    .options-wrap{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:16px;
      width:100%;
      max-width:100%;
    }

    .option-btn{
      width:100%;
      max-width:100%;
      margin:0;
      text-align:left;
      min-height:58px;
    }

    .result-number{
      font-size:3rem;
      color:var(--blue);
      margin:12px 0;
      font-weight:900;
    }

    .result-sub{
      font-size:1.12rem;
      color:#ddd;
      margin-bottom:10px;
    }

    .mini{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.5;
    }

    .lock-box{
      max-width:780px;
      margin:0 auto;
      background:linear-gradient(135deg, rgba(255,212,0,.10), rgba(255,0,230,.10));
      border:1px solid rgba(255,212,0,.25);
      border-radius:20px;
      padding:28px 18px;
      box-shadow:0 0 20px rgba(255,212,0,.12);
    }

    .lock-box h2{
      color:var(--yellow);
      font-size:2rem;
      margin-bottom:14px;
    }

    .lock-box p{
      color:#f3f4f6;
      line-height:1.6;
      margin-bottom:12px;
    }

    @media (max-width:700px){
      .grid-areas{
        grid-template-columns:1fr;
      }
      .box{
        padding:16px 12px;
      }
      #question-text{
        font-size:1rem;
      }
      .btn{
        font-size:.96rem;
        padding:13px 12px;
      }
    }
  
.radar-copa-reward-box{
  width:100%;
  max-width:780px;
  margin:18px auto 16px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(0,243,255,.10),rgba(255,212,0,.12));
  border:1px solid rgba(255,212,0,.35);
  box-shadow:0 0 18px rgba(255,212,0,.10);
  text-align:center;
}
.radar-copa-reward-box h3{
  color:var(--yellow);
  margin-bottom:8px;
  font-size:1.12rem;
  text-transform:uppercase;
}
.radar-copa-reward-box p{
  color:#e5e7eb;
  line-height:1.5;
  margin-bottom:12px;
}
.radar-copa-reward-box .radar-actions{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.radar-copa-reward-box button,
.radar-copa-reward-box a{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  max-width:320px;
  min-height:48px;
  border-radius:999px;
  padding:12px 14px;
  font-weight:900;
  text-decoration:none;
  border:1px solid rgba(255,212,0,.65);
}
.radar-copa-reward-box button{
  background:linear-gradient(135deg,#fff4bf,#ffd400,#f59e0b);
  color:#06142e;
  cursor:pointer;
}
.radar-copa-reward-box a{
  background:rgba(255,255,255,.06);
  color:#fff;
}

</style>
</head>
<body>

<header>
  <h1>ESPANHOL TESTE GRÁTIS</h1>
  <p>TESTE: 2 MÓDULOS LIBERADOS • 10 QUESTÕES CADA • PREMIUM: 10 MÓDULOS E 200 QUESTÕES</p>
</header>

<div id="app"></div>

<audio id="audio-bg" loop preload="auto" playsinline>
  <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=tension-103701.mp3" type="audio/mpeg">
</audio>

<audio id="audio-correct" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" type="audio/mpeg">
</audio>

<audio id="audio-wrong" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=error-126627.mp3" type="audio/mpeg">
</audio>

<script>
const PREMIUM_URL = "https://pay.kiwify.com.br/THSH11k";

const app = document.getElementById("app");
const audioBg = document.getElementById("audio-bg");
const audioCorrect = document.getElementById("audio-correct");
const audioWrong = document.getElementById("audio-wrong");

audioBg.volume = 0.06;
audioCorrect.volume = 0.45;
audioWrong.volume = 0.45;

let audioLiberado = false;
let areaAtual = "";
let questoesAtuais = [];
let indiceQuestao = 0;
let acertosObjetivas = 0;
let questaoRenderizadaAtual = null;

document.addEventListener("click", destravarAudio, { once: true });
document.addEventListener("touchstart", destravarAudio, { once: true });

function destravarAudio() {
  if (audioLiberado) return Promise.resolve(true);

  audioBg.muted = true;
  return audioBg.play()
    .then(() => {
      audioBg.pause();
      audioBg.currentTime = 0;
      audioBg.muted = false;
      audioLiberado = true;

      audioCorrect.play().then(() => {
        audioCorrect.pause();
        audioCorrect.currentTime = 0;
      }).catch(() => {});

      audioWrong.play().then(() => {
        audioWrong.pause();
        audioWrong.currentTime = 0;
      }).catch(() => {});

      return true;
    })
    .catch(() => false);
}

function tocarAudioFundo() {
  if (!audioLiberado) return;
  audioBg.currentTime = 0;
  audioBg.play().catch(() => {});
}

function pararAudioFundo() {
  audioBg.pause();
  audioBg.currentTime = 0;
}

function tocarAcerto() {
  audioCorrect.currentTime = 0;
  audioCorrect.play().catch(() => {});
}

function tocarErro() {
  audioWrong.currentTime = 0;
  audioWrong.play().catch(() => {});
}

const areas = [
  { nome: "Comprensión Lectora", descricao: "Módulo liberado no teste grátis.", liberada: true },
  { nome: "Vocabulario en Contexto", descricao: "Módulo liberado no teste grátis.", liberada: true },
  { nome: "Gramática Básica", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Tiempos Verbales", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Pronombres y Artículos", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Conectores y Significado", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Anuncios y Campañas", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Preposiciones y Expresiones", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Falsos Cognatos", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Producción Escrita", descricao: "Disponível apenas na versão premium.", liberada: false }
];

function criarObjetiva(area, numero, textoBase, pergunta, alternativas, correta) {
  return {
    tipo: "objetiva",
    area,
    numero,
    base: textoBase,
    q: pergunta,
    o: alternativas,
    c: correta
  };
}

function gerarAreaBase(nomeArea, perguntasObjetivas) {
  return perguntasObjetivas.map((item, i) =>
    criarObjetiva(nomeArea, i + 1, item.base, item.q, item.o, item.c)
  );
}

function embaralharAlternativas(questao) {
  const pares = questao.o.map((texto, idx) => ({ texto, correta: idx === questao.c }));
  for (let i = pares.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pares[i], pares[j]] = [pares[j], pares[i]];
  }
  return {
    ...questao,
    opcoesRenderizadas: pares.map(p => p.texto),
    corretaRenderizada: pares.findIndex(p => p.correta)
  };
}

const bancoQuestoes = {
  "Comprensión Lectora": gerarAreaBase(
    "Comprensión Lectora",
    [
      { base:`"Los estudiantes leen todos los días para mejorar su aprendizaje."`, q:"De acordo com o texto, por que os estudantes leem todos os dias?", o:["Para melhorar a aprendizagem","Para viajar de ônibus","Para descansar mais","Para evitar a escola"], c:0 },
      { base:`"La escuela organiza una campaña para reciclar papel y plástico."`, q:"Qual é o objetivo da escola?", o:["Organizar uma campanha de reciclagem","Fechar a biblioteca","Cancelar aulas","Vender livros"], c:0 },
      { base:`"Muchos jóvenes usan internet para estudiar y buscar información."`, q:"Segundo o texto, os jovens usam a internet para:", o:["Brincar apenas","Estudar e buscar informação","Dormir melhor","Evitar leitura"], c:1 },
      { base:`"El museo abre a las nueve y cierra a las cinco."`, q:"De acordo com o texto, o museu:", o:["Funciona das 9 às 17 horas","Abre à noite","Fecha ao meio-dia","Só abre aos domingos"], c:0 },
      { base:`"Caminar al colegio puede ser saludable y económico."`, q:"No texto, caminhar para a escola pode ser:", o:["Saudável e econômico","Perigoso e caro","Muito lento e inútil","Apenas divertido"], c:0 },
      { base:`"Los profesores tienen un papel importante en la educación."`, q:"Segundo o texto, os professores têm um papel:", o:["Sem importância","Importante na educação","Exclusivamente administrativo","Apenas esportivo"], c:1 },
      { base:`"Leer ayuda a comprender diferentes culturas."`, q:"A leitura ajuda a:", o:["Compreender culturas diferentes","Esquecer a escola","Parar de estudar línguas","Decorar números"], c:0 },
      { base:`"La alimentación saludable da más energía a los estudiantes."`, q:"Segundo o texto, alimentação saudável dá aos estudantes:", o:["Mais sono","Mais energia","Mais preguiça","Menos concentração"], c:1 },
      { base:`"Algunas personas prefieren estudiar por la noche porque trabajan durante el día."`, q:"Por que algumas pessoas estudam à noite?", o:["Porque trabalham durante o dia","Porque odeiam a manhã","Porque não existe escola de manhã","Porque estão de férias"], c:0 },
      { base:`"La biblioteca es un lugar tranquilo para leer y concentrarse."`, q:"No texto, a biblioteca é apresentada como um lugar:", o:["Barulhento","Tranquilo para leitura e concentração","Fechado para alunos","Usado só para jogos"], c:1 }
    ]
  ),

  "Vocabulario en Contexto": gerarAreaBase(
    "Vocabulario en Contexto",
    [
      { base:`"Ella está cansada después del trabajo."`, q:"A palavra 'cansada' significa:", o:["Animada","Cansada","Atrasada","Silenciosa"], c:1 },
      { base:`"Este coche es barato."`, q:"No texto, 'barato' quer dizer:", o:["Barato","Pesado","Velho","Rápido"], c:0 },
      { base:`"La habitación es ruidosa."`, q:"A palavra 'ruidosa' significa:", o:["Silenciosa","Barulhenta","Vazia","Limpa"], c:1 },
      { base:`"Me levanto a las seis."`, q:"A expressão 'me levanto' significa:", o:["Vou dormir","Me levanto","Chego cedo","Pego o ônibus"], c:1 },
      { base:`"Trabajo en una biblioteca."`, q:"A palavra 'biblioteca' significa:", o:["Livraria","Biblioteca","Laboratório","Igreja"], c:1 },
      { base:`"Él es un profesor amable."`, q:"A palavra 'amable' significa:", o:["Rígido","Amável","Perigoso","Fraco"], c:1 },
      { base:`"Es peligroso cruzar aquí."`, q:"'Peligroso' quer dizer:", o:["Seguro","Barato","Perigoso","Lento"], c:2 },
      { base:`"Llego temprano todos los días."`, q:"A palavra 'temprano' significa:", o:["Tarde","Cedo","Devagar","Ontem"], c:1 },
      { base:`"Compró un reloj nuevo."`, q:"No texto, 'reloj' significa:", o:["Relógio","Janela","Camisa","Bolsa"], c:0 },
      { base:`"Mi trabajo es estresante."`, q:"A palavra 'trabajo' significa:", o:["Descanso","Passeio","Trabalho","Escola"], c:2 }
    ]
  )
};

function irParaPremium() {
  if (!PREMIUM_URL || PREMIUM_URL.includes("COLE_AQUI")) {
    alert("Link premium não configurado.");
    return;
  }
  window.open(PREMIUM_URL,"_blank","noopener");
}

function mostrarMenu() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue); margin-bottom:8px;">Escolha um módulo de Espanhol</h2>
      <p class="mini">No teste grátis você libera <strong>2 módulos com 10 questões cada</strong>. Na versão premium você desbloqueia <strong>10 módulos e 200 questões</strong>.</p>

      <div class="grid-areas">
        ${areas.map(area => `
          <div class="card-area ${area.liberada ? "" : "locked"}">
            <h3>${area.liberada ? area.nome : "🔒 " + area.nome}</h3>
            <p>${area.descricao}</p>
            <button class="btn ${area.liberada ? "" : "btn-lock"}" onclick="${area.liberada ? `iniciarArea('${area.nome.replace(/'/g, "\\'")}')` : `mostrarBloqueio()`}">
              ${area.liberada ? "Entrar neste módulo" : "Desbloquear no premium"}
            </button>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function mostrarBloqueio() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="lock-box">
      <h2>🔒 MÓDULO PREMIUM</h2>
      <p>Esse módulo está disponível apenas na versão completa do simulado de Espanhol.</p>
      <p>No premium você desbloqueia <strong>10 módulos</strong> e <strong>200 questões completas</strong>.</p>
      <button class="btn btn-premium" onclick="irParaPremium()">LIBERAR ACESSO COMPLETO</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">VOLTAR AO MENU</button>
    </div>
  `;
}

async function iniciarArea(nomeArea) {
  await destravarAudio();
  areaAtual = nomeArea;
  questoesAtuais = bancoQuestoes[nomeArea] || [];
  indiceQuestao = 0;
  acertosObjetivas = 0;
  questaoRenderizadaAtual = null;

  if (!questoesAtuais.length) {
    app.innerHTML = `
      <div class="box">
        <h2 style="color:var(--red);">Erro ao abrir o módulo</h2>
        <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
      </div>
    `;
    return;
  }

  setTimeout(() => {
    tocarAudioFundo();
  }, 120);

  carregarQuestao();
}

function montarEnunciado(questao) {
  return `
    <span class="question-label">Texto base em espanhol:</span>
    <span class="text-base">${questao.base}</span>
    <span class="question-label">Pergunta:</span>
    ${questao.q}
  `;
}

function carregarQuestao() {
  const questao = questoesAtuais[indiceQuestao];
  const total = questoesAtuais.length;
  questaoRenderizadaAtual = embaralharAlternativas(questao);

  let html = `
    <div class="box">
      <div class="status">
        <span>${areaAtual}</span>
        <span>Questão ${indiceQuestao + 1}/${total}</span>
      </div>
      <div id="question-text">${montarEnunciado(questaoRenderizadaAtual)}</div>
      <div class="options-wrap">
  `;

  questaoRenderizadaAtual.opcoesRenderizadas.forEach((alt, idx) => {
    html += `<button class="btn option-btn" onclick="responderObjetiva(${idx})">${alt}</button>`;
  });

  html += `
      </div>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;

  app.innerHTML = html;
}

function responderObjetiva(escolhida) {
  const botoes = document.querySelectorAll(".option-btn");
  const correta = questaoRenderizadaAtual.corretaRenderizada;

  botoes.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === correta) btn.classList.add("correct");
  });

  if (escolhida === correta) {
    acertosObjetivas++;
    tocarAcerto();
  } else {
    botoes[escolhida].classList.add("wrong");
    tocarErro();
  }

  setTimeout(() => {
    indiceQuestao++;
    if (indiceQuestao < questoesAtuais.length) {
      carregarQuestao();
    } else {
      finalizarArea();
    }
  }, 900);
}

function finalizarArea() {
  pararAudioFundo();

  const notaFinal = acertosObjetivas * 10;
  const totalPossivel = 200;
  let feedback = "Você concluiu uma amostra do Simulado Espanhol ENEM. A versão premium possui 10 módulos e 200 questões.";

  if (notaFinal >= 80) feedback += " Ótimo resultado no teste grátis. Você já pode avançar para o premium.";
  else if (notaFinal >= 50) feedback += " Bom começo. No premium você treina o restante dos módulos.";
  else feedback += " Esse teste já mostrou onde melhorar. O premium ajuda a evoluir com treino completo.";

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue);">${areaAtual}</h2>
      <div class="result-number">${notaFinal}/${totalPossivel}</div>
      <div class="result-sub">Acertos: ${acertosObjetivas}/10</div>
      <p class="mini" style="margin-bottom:18px;">${feedback}</p>

      <button class="btn btn-premium" onclick="irParaPremium()">DESBLOQUEAR VERSÃO COMPLETA</button>
      <button class="btn" onclick="iniciarArea('${areaAtual.replace(/'/g, "\\'")}')">Refazer este módulo</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;
}


const RADAR_COPA_ALBUM_URL = "https://dev-orient-social.github.io/radar-copa-2026-com-album/album/index.html?v=4000";

function calcularRecompensaRadarCopa() {
  if (acertosObjetivas >= 10) return 5;
  if (acertosObjetivas >= 5) return 3;
  return 1;
}

function registrarRecompensaRadarCopa() {
  try {
    const figurinhas = calcularRecompensaRadarCopa();
    const recompensa = {
      tipo: "simulado_gratis",
      idSimulado: "espanhol-teste-gratis",
      origem: "Gabarito Max Espanhol Teste Grátis",
      figurinhas,
      acertos: acertosObjetivas,
      total: 10,
      data: new Date().toISOString()
    };

    const lista = JSON.parse(localStorage.getItem("radar_copa_recompensas") || "[]");
    lista.push(recompensa);
    localStorage.setItem("radar_copa_recompensas", JSON.stringify(lista));

    alert("🎁 Recompensa Radar Copa registrada: +" + figurinhas + " figurinha(s). Abra o álbum e vá em Resgates/Relatório para conferir.");
  } catch(e) {
    alert("Não foi possível registrar a recompensa agora. Abra o álbum e tente novamente.");
  }
}

function abrirAlbumRadarCopa() {
  window.open(RADAR_COPA_ALBUM_URL, "_blank", "noopener");
}
